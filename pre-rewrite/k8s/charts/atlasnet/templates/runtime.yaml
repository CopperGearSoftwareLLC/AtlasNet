{{- $serverNodeName := required "values.serverNodeName is required" .Values.serverNodeName -}}
{{- $imagePullPolicy := default "IfNotPresent" .Values.imagePullPolicy -}}
{{- $watchdogImage := required "values.images.watchdog is required" .Values.images.watchdog -}}
{{- $proxyImage := required "values.images.proxy is required" .Values.images.proxy -}}
{{- $shardImage := required "values.images.shard is required" .Values.images.shard -}}
{{- $cartographImage := required "values.images.cartograph is required" .Values.images.cartograph -}}
{{- $internaldbImage := required "values.images.internaldb is required" .Values.images.internaldb -}}
{{- $cartographMode := default "development" .Values.cartograph.mode -}}
{{- $llmEnabled := default false .Values.llm.enabled -}}
{{- $llmImage := default "ghcr.io/ggml-org/llama.cpp:server" .Values.llm.image -}}
{{- $llmServicePort := int (default 8080 .Values.llm.servicePort) -}}
{{- $llmEndpoint := default "" .Values.llm.endpoint -}}
{{- $llmApiFormat := default "openai" .Values.llm.apiFormat -}}
{{- $llmModelId := default "huggingface.co/dannys0n/qwen3-1.7b-seed_gen_voronoi:Q4_K_M" .Values.llm.modelId -}}
{{- $llmModelFileName := default "model.gguf" .Values.llm.modelFileName -}}
{{- $llmOfflineEnabled := default false .Values.llm.offline.enabled -}}
{{- $llmModelSeedImage := default "" .Values.llm.offline.modelSeedImage -}}
{{- $llmPvcSize := default "8Gi" .Values.llm.pvcSize -}}
{{- $llmContextSize := int (default 4096 .Values.llm.contextSize) -}}
{{- $llmThreads := int (default 4 .Values.llm.threads) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlasnet-watchdog
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlasnet-watchdog-scaler
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups:
      - apps
    resources:
      - deployments/scale
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlasnet-watchdog-scaler
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: atlasnet-watchdog
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atlasnet-watchdog-scaler
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlasnet-cartograph
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlasnet-cartograph-reader
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlasnet-cartograph-reader
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: atlasnet-cartograph
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atlasnet-cartograph-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: atlasnet-cartograph-cluster-reader
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: atlasnet-cartograph-cluster-reader
subjects:
  - kind: ServiceAccount
    name: atlasnet-cartograph
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: atlasnet-cartograph-cluster-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasnet-watchdog
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-watchdog
    atlasnet.role: watchdog
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlasnet-watchdog
  template:
    metadata:
      labels:
        app: atlasnet-watchdog
        atlasnet.role: watchdog
    spec:
      serviceAccountName: atlasnet-watchdog
      enableServiceLinks: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ $serverNodeName | quote }}
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: watchdog
          image: {{ $watchdogImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ATLASNET_SHARD_DEPLOYMENT
              value: atlasnet-shard
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: INTERNAL_REDIS_SERVICE_NAME
              value: "$(INTERNALDB_SERVICE_HOST)"
            - name: INTERNAL_REDIS_PORT
              value: "$(INTERNALDB_SERVICE_PORT)"
            {{- if or $llmEnabled $llmEndpoint }}
            - name: ATLASNET_LLM_ENDPOINT
              value: {{ default (printf "http://atlasnet-llm:%d/v1/chat/completions" $llmServicePort) $llmEndpoint | quote }}
            {{- end }}
            {{- if or $llmEnabled $llmApiFormat }}
            - name: ATLASNET_LLM_API_FORMAT
              value: {{ $llmApiFormat | quote }}
            {{- end }}
            {{- if or $llmEnabled $llmModelId }}
            - name: ATLASNET_LLM_MODEL_ID
              value: {{ $llmModelId | quote }}
            {{- end }}
          ports:
            - name: interlink
              containerPort: 25555
              protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasnet-shard
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-shard
    atlasnet.role: shard
spec:
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: atlasnet-shard
  template:
    metadata:
      labels:
        app: atlasnet-shard
        atlasnet.role: shard
    spec:
      terminationGracePeriodSeconds: 5
      enableServiceLinks: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: atlasnet-shard
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: atlasnet-shard
      containers:
        - name: shard
          image: {{ $shardImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    kill -TERM 1 2>/dev/null || true
                    i=0
                    while kill -0 1 2>/dev/null; do
                      i=$((i + 1))
                      if [ "$i" -ge 4 ]; then
                        break
                      fi
                      sleep 1
                    done
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: INTERNAL_REDIS_SERVICE_NAME
              value: "$(INTERNALDB_SERVICE_HOST)"
            - name: INTERNAL_REDIS_PORT
              value: "$(INTERNALDB_SERVICE_PORT)"
          ports:
            - name: interlink
              containerPort: 25555
              protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasnet-internaldb
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-internaldb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlasnet-internaldb
  template:
    metadata:
      labels:
        app: atlasnet-internaldb
    spec:
      enableServiceLinks: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ $serverNodeName | quote }}
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: internaldb
          image: {{ $internaldbImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          command:
            - valkey-server
            - --appendonly
            - "yes"
            - --port
            - "6379"
            - --loadmodule
            - /usr/lib/valkey/libjson.so
            - --loadmodule
            - /usr/lib/valkey/libsearch.so
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: internaldb
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: atlasnet-internaldb
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: Service
metadata:
  name: atlasnet-internaldb
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: atlasnet-internaldb
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: atlasnet-cartograph
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-cartograph
spec:
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: atlasnet-cartograph
  template:
    metadata:
      labels:
        app: atlasnet-cartograph
    spec:
      serviceAccountName: atlasnet-cartograph
      enableServiceLinks: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ $serverNodeName | quote }}
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cartograph
          image: {{ $cartographImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          {{- if eq $cartographMode "production" }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              sed -i 's/retryStrategy: null/retryStrategy: () => null/' \
                src/app/api/heuristic-control/route.ts \
                src/app/api/recompute-snapshots/route.ts
              cat > next.config.ts <<'EOF'
              /** @type {import('next').NextConfig} */
              const nextConfig = {
                eslint: {
                  ignoreDuringBuilds: true,
                },
                typescript: {
                  ignoreBuildErrors: true,
                },
              }

              module.exports = nextConfig;
              EOF
              npm run build
              node native-server/native-server.js &
              exec npm run start -- --hostname 0.0.0.0
          {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: INTERNAL_REDIS_SERVICE_NAME
              value: "$(INTERNALDB_SERVICE_HOST)"
            - name: INTERNAL_REDIS_PORT
              value: "$(INTERNALDB_SERVICE_PORT)"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: inspect
              containerPort: 9229
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: atlasnet-cartograph
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: atlasnet-cartograph
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
    - name: inspect
      protocol: TCP
      port: 9229
      targetPort: inspect
{{ $cartographIngressHost := required "values.cartograph.ingress.host is required" .Values.cartograph.ingress.host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlasnet-cartograph
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: {{ default "nginx" .Values.cartograph.ingress.className | quote }}
  rules:
    - host: {{ $cartographIngressHost | quote }}
      http:
        paths:
          - path: {{ default "/" .Values.cartograph.ingress.path | quote }}
            pathType: {{ default "Prefix" .Values.cartograph.ingress.pathType | quote }}
            backend:
              service:
                name: atlasnet-cartograph
                port:
                  number: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atlasnet-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-proxy
spec:
  serviceName: atlasnet-proxy-headless
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: atlasnet-proxy
  template:
    metadata:
      labels:
        app: atlasnet-proxy
    spec:
      enableServiceLinks: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ $serverNodeName | quote }}
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: proxy
          image: {{ $proxyImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          env:
            - name: HANDSHAKE_SERVICE_ENABLE
              value: "1"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: INTERNAL_REDIS_SERVICE_NAME
              value: "$(INTERNALDB_SERVICE_HOST)"
            - name: INTERNAL_REDIS_PORT
              value: "$(INTERNALDB_SERVICE_PORT)"
          ports:
            - name: interlink
              containerPort: 25555
              protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: atlasnet-proxy-headless
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: atlasnet-proxy
  ports:
    - name: proxy-udp
      protocol: UDP
      port: 2555
      targetPort: interlink
---
apiVersion: v1
kind: Service
metadata:
  name: atlasnet-proxy
  namespace: {{ .Release.Namespace }}
spec:
  type: LoadBalancer
  sessionAffinity: ClientIP
  selector:
    app: atlasnet-proxy
  ports:
    - name: proxy-udp
      protocol: UDP
      port: 2555
      targetPort: interlink
{{- if $llmEnabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlasnet-llm-model-cache
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $llmPvcSize | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: atlasnet-llm
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: atlasnet-llm
  ports:
    - name: http
      port: {{ $llmServicePort }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasnet-llm
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-llm
    atlasnet.role: llm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlasnet-llm
  template:
    metadata:
      labels:
        app: atlasnet-llm
        atlasnet.role: llm
    spec:
      enableServiceLinks: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ $serverNodeName | quote }}
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      initContainers:
        {{- if $llmOfflineEnabled }}
        - name: model-seed
          image: {{ required "values.llm.offline.modelSeedImage is required when llm.offline.enabled=true" $llmModelSeedImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /models
              if [ ! -s "/models/{{ $llmModelFileName }}" ]; then
                cp /seed/model.gguf "/models/{{ $llmModelFileName }}"
              fi
          volumeMounts:
            - name: model-cache
              mountPath: /models
        {{- else }}
        - name: model-download
          image: curlimages/curl:8.12.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /models
              if [ ! -s "/models/{{ $llmModelFileName }}" ]; then
                curl -L --fail --retry 3 --output "/models/{{ $llmModelFileName }}" "{{ required "values.llm.modelUrl is required when llm.enabled=true" .Values.llm.modelUrl }}"
              fi
          volumeMounts:
            - name: model-cache
              mountPath: /models
        {{- end }}
      containers:
        - name: llm
          image: {{ $llmImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          env:
            - name: LLAMA_ARG_MODEL
              value: {{ printf "/models/%s" $llmModelFileName | quote }}
            - name: LLAMA_ARG_HOST
              value: "0.0.0.0"
            - name: LLAMA_ARG_PORT
              value: {{ printf "%d" $llmServicePort | quote }}
            - name: LLAMA_ARG_CTX_SIZE
              value: {{ printf "%d" $llmContextSize | quote }}
            - name: LLAMA_ARG_THREADS
              value: {{ printf "%d" $llmThreads | quote }}
          ports:
            - name: http
              containerPort: {{ $llmServicePort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: atlasnet-llm-model-cache
{{- end }}
