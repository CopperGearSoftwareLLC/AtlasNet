version: 0.2

phases:
  install:
    commands:
      - 'echo "Starting minimal dependency sanity check"'
      - 'echo "Architecture: $(uname -m)"'
      - 'if [ -f /etc/os-release ]; then cat /etc/os-release; fi'
      - 'if command -v dnf >/dev/null 2>&1; then echo "Using dnf to install perl + compiler toolchain + CMake/Ninja + fetch tools + python3 + linux headers"; dnf install -y perl gcc gcc-c++ make cmake ninja-build git curl tar zip unzip python3 kernel-headers glibc-headers; elif command -v yum >/dev/null 2>&1; then echo "Using yum to install perl + compiler toolchain + CMake/Ninja + fetch tools + python3 + linux headers"; yum install -y perl gcc gcc-c++ make cmake3 ninja-build git curl tar zip unzip python3 kernel-headers glibc-headers; elif command -v apt-get >/dev/null 2>&1; then echo "Using apt-get to install perl + compiler toolchain + CMake/Ninja + fetch tools + python3 + linux headers"; apt-get update; apt-get install -y perl build-essential cmake ninja-build git curl tar zip unzip python3 linux-libc-dev; else echo "No supported package manager found"; exit 1; fi'
      - 'if command -v dnf >/dev/null 2>&1; then echo "Installing Perl Time::Piece support"; dnf install -y "perl(Time::Piece)" || dnf install -y perl-Time-Piece || dnf install -y perl-core; elif command -v yum >/dev/null 2>&1; then echo "Installing Perl Time::Piece support"; yum install -y "perl(Time::Piece)" || yum install -y perl-Time-Piece || yum install -y perl-core; elif command -v apt-get >/dev/null 2>&1; then echo "Installing Perl Time::Piece support"; apt-get install -y perl-modules; fi'
  build:
    commands:
      - 'echo "Verifying perl + compiler toolchain + CMake/Ninja + fetch tools + python3 + linux headers installation"'
      - 'command -v perl'
      - 'perl -v'
      - 'perl -MTime::Piece -e "print qq(Time::Piece $Time::Piece::VERSION\n)"'
      - 'command -v gcc'
      - 'gcc --version'
      - 'command -v g++'
      - 'g++ --version'
      - 'command -v make'
      - 'make --version'
      - 'if command -v cmake >/dev/null 2>&1; then cmake --version; elif command -v cmake3 >/dev/null 2>&1; then cmake3 --version; else echo "cmake not found"; exit 1; fi'
      - 'if command -v ninja >/dev/null 2>&1; then ninja --version; elif command -v ninja-build >/dev/null 2>&1; then ninja-build --version; else echo "ninja not found"; exit 1; fi'
      - 'command -v git'
      - 'git --version'
      - 'command -v curl'
      - 'curl --version'
      - 'command -v tar'
      - 'tar --version'
      - 'command -v zip'
      - 'zip -v | head -n 2'
      - 'command -v unzip'
      - 'unzip -v | head -n 2'
      - 'command -v python3'
      - 'python3 --version'
      - 'if command -v rpm >/dev/null 2>&1; then rpm -q kernel-headers glibc-headers || true; fi'
      - 'if command -v dpkg-query >/dev/null 2>&1; then dpkg-query -W linux-libc-dev || true; fi'
      - 'for header in /usr/include/linux/version.h /usr/include/linux/limits.h; do if [ -e "$header" ]; then echo "Found $header"; else echo "Missing $header"; fi; done'
      - 'echo "Bootstrapping pinned vcpkg release"'
      - 'rm -rf /tmp/vcpkg-test && mkdir -p /tmp/vcpkg-test'
      - 'curl -fsSL https://github.com/microsoft/vcpkg/archive/refs/tags/2026.01.16.tar.gz | tar -xz --strip-components=1 -C /tmp/vcpkg-test'
      - 'cd /tmp/vcpkg-test && ./bootstrap-vcpkg.sh'
      - '/tmp/vcpkg-test/vcpkg version'
      - 'export HOME=/tmp/codebuild-home && mkdir -p "$HOME"'
      - 'export XDG_CACHE_HOME="$HOME/.cache" && mkdir -p "$XDG_CACHE_HOME"'
      - 'echo "Using HOME=$HOME"'
      - 'echo "Installing standalone openssl for arm64-linux via vcpkg"'
      - 'set +e; VCPKG_DISABLE_METRICS=1 /tmp/vcpkg-test/vcpkg install openssl --triplet=arm64-linux; status=$?; set -e; echo "vcpkg openssl exit status: $status"; for log in /tmp/vcpkg-test/buildtrees/openssl/config-arm64-linux-dbg-out.log /tmp/vcpkg-test/buildtrees/openssl/config-arm64-linux-dbg-err.log /tmp/vcpkg-test/buildtrees/openssl/config-arm64-linux-rel-out.log /tmp/vcpkg-test/buildtrees/openssl/config-arm64-linux-rel-err.log /tmp/vcpkg-test/buildtrees/openssl/stdout-arm64-linux.log /tmp/vcpkg-test/buildtrees/openssl/stderr-arm64-linux.log; do if [ -f "$log" ]; then echo "==> Tail of $log"; tail -n 120 "$log" || true; echo "==> End tail of $log"; fi; done; if [ "$status" -ne 0 ]; then exit "$status"; fi'
      - 'find /tmp/vcpkg-test/buildtrees/openssl -maxdepth 1 -type f -name "*.log" -print | sort'
      - 'for log in /tmp/vcpkg-test/buildtrees/openssl/*.log; do if [ -f "$log" ]; then echo "==> Tail of $log"; tail -n 80 "$log" || true; echo "==> End tail of $log"; fi; done'
      - 'echo "Installing a small AtlasNet dependency subset via vcpkg"'
      - 'set +e; VCPKG_DISABLE_METRICS=1 /tmp/vcpkg-test/vcpkg install libuv "hiredis[ssl]" --triplet=arm64-linux; status=$?; set -e; echo "AtlasNet subset install exit status: $status"; if [ "$status" -ne 0 ]; then exit "$status"; fi'
      - '/tmp/vcpkg-test/vcpkg list'
      - 'echo "Installing redis-plus-plus with AtlasNet feature set via vcpkg"'
      - 'set +e; VCPKG_DISABLE_METRICS=1 /tmp/vcpkg-test/vcpkg install "redis-plus-plus[tls,cxx17,async,async-std]" --triplet=arm64-linux; status=$?; set -e; echo "redis-plus-plus install exit status: $status"; if [ "$status" -ne 0 ]; then exit "$status"; fi'
      - '/tmp/vcpkg-test/vcpkg list | grep -E "redis-plus-plus|hiredis|libuv|openssl"'
