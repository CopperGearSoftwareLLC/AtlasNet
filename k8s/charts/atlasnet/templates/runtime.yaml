apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: atlasnet-node-netcheck
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-node-netcheck
spec:
  selector:
    matchLabels:
      app: atlasnet-node-netcheck
  template:
    metadata:
      labels:
        app: atlasnet-node-netcheck
    spec:
      serviceAccountName: atlasnet-node-netcheck
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoSchedule
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoExecute
      containers:
        - name: netcheck
          image: nicolaka/netshoot:v0.13
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: TARGET_HOST
              value: {{ $internaldbHost | quote }}
            - name: TARGET_PORT
              value: "6379"
          volumeMounts:
            - name: netcheck-status
              mountPath: /var/run/atlasnet-netcheck
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              STATUS_DIR="/var/run/atlasnet-netcheck"
              READY_FILE="${STATUS_DIR}/ready"
              REASON_FILE="${STATUS_DIR}/reason"
              mkdir -p "$STATUS_DIR"
              last_reason=""

              while true; do
                reason="ok"
                if ! getent hosts "$TARGET_HOST" >/dev/null 2>&1; then
                  reason="dns"
                elif ! nc -z -w 2 "$TARGET_HOST" "$TARGET_PORT" >/dev/null 2>&1; then
                  reason="internaldb-tcp"
                elif ! nc -z -w 2 "$KUBERNETES_SERVICE_HOST" "$KUBERNETES_SERVICE_PORT" >/dev/null 2>&1; then
                  reason="api-tcp"
                fi

                printf '%s\n' "$reason" >"$REASON_FILE"
                if [ "$reason" = "ok" ]; then
                  : >"$READY_FILE"
                else
                  rm -f "$READY_FILE"
                fi

                if [ "$reason" != "$last_reason" ]; then
                  status="healthy"
                  if [ "$reason" != "ok" ]; then
                    status="unhealthy"
                  fi
                  echo "$(date -Iseconds) atlasnet-node-netcheck node=${NODE_NAME} status=${status} reason=${reason}"
                  last_reason="$reason"
                fi

                sleep 2
              done
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  test -f /var/run/atlasnet-netcheck/ready
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 1
      volumes:
        - name: netcheck-status
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasnet-node-taint-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-node-taint-controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlasnet-node-taint-controller
  template:
    metadata:
      labels:
        app: atlasnet-node-taint-controller
    spec:
      serviceAccountName: atlasnet-node-taint-controller
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ $serverNodeName | quote }}
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoSchedule
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoExecute
      containers:
        - name: controller
          image: nicolaka/netshoot:v0.13
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TAINT_KEY
              value: {{ $internaldbUnreachableTaintKey | quote }}
            - name: STATUS_ANNOTATION
              value: {{ $internaldbNetcheckStatusAnnotation | quote }}
            - name: REASON_ANNOTATION
              value: {{ $internaldbNetcheckReasonAnnotation | quote }}
            - name: UPDATED_AT_ANNOTATION
              value: {{ $internaldbNetcheckUpdatedAtAnnotation | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              TOKEN_PATH="/var/run/secrets/kubernetes.io/serviceaccount/token"
              CA_PATH="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              API_BASE="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"

              api_get() {
                curl --silent --show-error --fail \
                  --cacert "$CA_PATH" \
                  -H "Authorization: Bearer $(cat "$TOKEN_PATH")" \
                  "$@"
              }

              api_try_get() {
                curl --silent --show-error \
                  --cacert "$CA_PATH" \
                  -H "Authorization: Bearer $(cat "$TOKEN_PATH")" \
                  "$@" 2>/dev/null || true
              }

              patch_node_state() {
                node="$1"
                taints_json="$2"
                status="$3"
                reason="$4"
                updated_at="$5"
                payload="$(jq -cn \
                  --argjson taints "$taints_json" \
                  --arg status "$status" \
                  --arg reason "$reason" \
                  --arg updated_at "$updated_at" \
                  --arg status_annotation "$STATUS_ANNOTATION" \
                  --arg reason_annotation "$REASON_ANNOTATION" \
                  --arg updated_at_annotation "$UPDATED_AT_ANNOTATION" \
                  '{spec:{taints:$taints},metadata:{annotations:{($status_annotation):$status,($reason_annotation):$reason,($updated_at_annotation):$updated_at}}}')"
                curl --silent --show-error --fail \
                  --cacert "$CA_PATH" \
                  -H "Authorization: Bearer $(cat "$TOKEN_PATH")" \
                  -H "Content-Type: application/merge-patch+json" \
                  -X PATCH \
                  "${API_BASE}/api/v1/nodes/${node}" \
                  -d "$payload" >/dev/null
              }

              while true; do
                for node in $(api_get "${API_BASE}/api/v1/nodes" | jq -r '.items[].metadata.name'); do
                  node_json="$(api_get "${API_BASE}/api/v1/nodes/${node}")"
                  node_ready="$(printf '%s' "$node_json" | jq -r '([.status.conditions[]? | select(.type == "Ready") | .status] | first) // ""')"
                  node_status="$(printf '%s' "$node_json" | jq -r --arg key "$STATUS_ANNOTATION" '.metadata.annotations[$key] // ""')"
                  node_reason="$(printf '%s' "$node_json" | jq -r --arg key "$REASON_ANNOTATION" '.metadata.annotations[$key] // ""')"
                  pod_json="$(api_get --get "${API_BASE}/api/v1/namespaces/${POD_NAMESPACE}/pods" \
                    --data-urlencode "labelSelector=app=atlasnet-node-netcheck" \
                    --data-urlencode "fieldSelector=spec.nodeName=${node}" \
                    )"
                  pod_name="$(printf '%s' "$pod_json" | jq -r '([.items[]?.metadata.name] | first) // ""')"
                  ready="$(printf '%s' "$pod_json" | jq -r '([.items[]?.status.conditions[]? | select(.type=="Ready") | .status] | first) // ""')"
                  tainted="$(printf '%s' "$node_json" | jq -r --arg key "$TAINT_KEY" '([.spec.taints[]? | select(.key == $key) | .effect] | first) // ""')"

                  status="healthy"
                  reason="ok"
                  if [ -z "$pod_name" ]; then
                    status="unhealthy"
                    reason="netcheck-missing"
                  elif [ "$ready" != "True" ]; then
                    status="unhealthy"
                    if [ "$node_ready" != "True" ]; then
                      reason="node-unreachable"
                    else
                      reason="$(api_try_get "${API_BASE}/api/v1/namespaces/${POD_NAMESPACE}/pods/${pod_name}/log?tailLines=1" \
                        | sed -n 's/.*reason=\([^[:space:]]*\).*/\1/p' | tail -n 1)"
                      if [ -z "$reason" ]; then
                        reason="netcheck-unready"
                      fi
                    fi
                  fi

                  expected_taint=""
                  if [ "$status" != "healthy" ]; then
                    expected_taint="NoSchedule"
                    if [ "$reason" = "node-unreachable" ]; then
                      expected_taint="NoExecute"
                    fi
                  fi

                  if [ "$status" = "healthy" ]; then
                    new_taints="$(printf '%s' "$node_json" | jq -c --arg key "$TAINT_KEY" '(.spec.taints // []) | map(select(.key != $key))')"
                  else
                    new_taints="$(printf '%s' "$node_json" | jq -c --arg key "$TAINT_KEY" --arg effect "$expected_taint" '(.spec.taints // []) | map(select(.key != $key)) + [{"key":$key,"value":"true","effect":$effect}] | unique_by(.key + ":" + .effect)')"
                  fi

                  if [ "$tainted" != "$expected_taint" ] || [ "$node_status" != "$status" ] || [ "$node_reason" != "$reason" ]; then
                    updated_at="$(date -Iseconds)"
                    action="refresh"
                    if [ -z "$tainted" ] && [ "$expected_taint" = "NoSchedule" ]; then
                      action="taint"
                    elif [ -n "$tainted" ] && [ -z "$expected_taint" ]; then
                      action="untaint"
                    fi
                    echo "${updated_at} atlasnet-node-taint-controller node=${node} status=${status} reason=${reason} action=${action}"
                    patch_node_state "$node" "$new_taints" "$status" "$reason" "$updated_at" || true
                  fi
                done
                sleep 3
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasnet-watchdog
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-watchdog
    atlasnet.role: watchdog
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlasnet-watchdog
  template:
    metadata:
      labels:
        app: atlasnet-watchdog
        atlasnet.role: watchdog
    spec:
      serviceAccountName: atlasnet-watchdog
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ $serverNodeName | quote }}
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoSchedule
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoExecute
      containers:
        - name: watchdog
          image: {{ $watchdogImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ATLASNET_SHARD_DEPLOYMENT
              value: atlasnet-shard
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: INTERNAL_REDIS_SERVICE_NAME
              value: {{ $internaldbHost | quote }}
            - name: INTERNAL_REDIS_PORT
              value: "6379"
            {{- if or $llmEnabled $llmEndpoint }}
            - name: ATLASNET_LLM_ENDPOINT
              value: {{ default (printf "http://atlasnet-llm:%d/v1/chat/completions" $llmServicePort) $llmEndpoint | quote }}
            {{- end }}
            {{- if or $llmEnabled $llmApiFormat }}
            - name: ATLASNET_LLM_API_FORMAT
              value: {{ $llmApiFormat | quote }}
            {{- end }}
            {{- if or $llmEnabled $llmModelId }}
            - name: ATLASNET_LLM_MODEL_ID
              value: {{ $llmModelId | quote }}
            {{- end }}
          ports:
            - name: interlink
              containerPort: 25555
              protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasnet-shard
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-shard
    atlasnet.role: shard
spec:
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: atlasnet-shard
  template:
    metadata:
      labels:
        app: atlasnet-shard
        atlasnet.role: shard
    spec:
      terminationGracePeriodSeconds: 5
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: atlasnet-shard
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: atlasnet-shard
      containers:
        - name: shard
          image: {{ $shardImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    kill -TERM 1 2>/dev/null || true
                    i=0
                    while kill -0 1 2>/dev/null; do
                      i=$((i + 1))
                      if [ "$i" -ge 4 ]; then
                        break
                      fi
                      sleep 1
                    done
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: INTERNAL_REDIS_SERVICE_NAME
              value: {{ $internaldbHost | quote }}
            - name: INTERNAL_REDIS_PORT
              value: "6379"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  getent hosts "$INTERNAL_REDIS_SERVICE_NAME" >/dev/null 2>&1
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 1
          ports:
            - name: interlink
              containerPort: 25555
              protocol: UDP
---
