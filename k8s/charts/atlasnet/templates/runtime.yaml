        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoSchedule
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoExecute
      containers:
        - name: cartograph
          image: {{ $cartographImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          {{- if eq $cartographMode "production" }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              sed -i 's/retryStrategy: null/retryStrategy: () => null/' \
                src/app/api/heuristic-control/route.ts \
                src/app/api/recompute-snapshots/route.ts
              cat > next.config.ts <<'EOF'
              /** @type {import('next').NextConfig} */
              const nextConfig = {
                eslint: {
                  ignoreDuringBuilds: true,
                },
                typescript: {
                  ignoreBuildErrors: true,
                },
              }

              module.exports = nextConfig;
              EOF
              npm run build
              node native-server/native-server.js &
              exec npm run start -- --hostname 0.0.0.0
          {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: INTERNAL_REDIS_SERVICE_NAME
              value: {{ $internaldbHost | quote }}
            - name: INTERNAL_REDIS_PORT
              value: "6379"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: inspect
              containerPort: 9229
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: atlasnet-cartograph
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: atlasnet-cartograph
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
    - name: inspect
      protocol: TCP
      port: 9229
      targetPort: inspect
{{ $cartographIngressHost := required "values.cartograph.ingress.host is required" .Values.cartograph.ingress.host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlasnet-cartograph
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: {{ default "nginx" .Values.cartograph.ingress.className | quote }}
  rules:
    - host: {{ $cartographIngressHost | quote }}
      http:
        paths:
          - path: {{ default "/" .Values.cartograph.ingress.path | quote }}
            pathType: {{ default "Prefix" .Values.cartograph.ingress.pathType | quote }}
            backend:
              service:
                name: atlasnet-cartograph
                port:
                  number: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atlasnet-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-proxy
spec:
  serviceName: atlasnet-proxy-headless
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: atlasnet-proxy
  template:
    metadata:
      labels:
        app: atlasnet-proxy
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoSchedule
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoExecute
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ $serverNodeName | quote }}
      containers:
        - name: proxy
          image: {{ $proxyImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          env:
            - name: HANDSHAKE_SERVICE_ENABLE
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: INTERNAL_REDIS_SERVICE_NAME
              value: {{ $internaldbHost | quote }}
            - name: INTERNAL_REDIS_PORT
              value: "6379"
          ports:
            - name: interlink
              containerPort: 25555
              protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: atlasnet-proxy-headless
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: atlasnet-proxy
  ports:
    - name: proxy-udp
      protocol: UDP
      port: 2555
      targetPort: interlink
---
apiVersion: v1
kind: Service
metadata:
  name: atlasnet-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    svccontroller.k3s.cattle.io/lbpool: atlasnet-server
spec:
  type: LoadBalancer
  sessionAffinity: ClientIP
  selector:
    app: atlasnet-proxy
  ports:
    - name: proxy-udp
      protocol: UDP
      port: 2555
      targetPort: interlink
{{- if $llmEnabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlasnet-llm-model-cache
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $llmPvcSize | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: atlasnet-llm
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: atlasnet-llm
  ports:
    - name: http
      port: {{ $llmServicePort }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasnet-llm
  namespace: {{ .Release.Namespace }}
  labels:
    app: atlasnet-llm
    atlasnet.role: llm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlasnet-llm
  template:
    metadata:
      labels:
        app: atlasnet-llm
        atlasnet.role: llm
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ $serverNodeName | quote }}
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ $nodeLossTolerationSeconds }}
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoSchedule
        - key: {{ $internaldbUnreachableTaintKey | quote }}
          operator: Exists
          effect: NoExecute
      initContainers:
        - name: model-download
          image: curlimages/curl:8.12.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /models
              if [ ! -s "/models/{{ $llmModelFileName }}" ]; then
                curl -L --fail --retry 3 --output "/models/{{ $llmModelFileName }}" "{{ required "values.llm.modelUrl is required when llm.enabled=true" .Values.llm.modelUrl }}"
              fi
          volumeMounts:
            - name: model-cache
              mountPath: /models
      containers:
        - name: llm
          image: {{ $llmImage | quote }}
          imagePullPolicy: {{ $imagePullPolicy | quote }}
          env:
            - name: LLAMA_ARG_MODEL
              value: {{ printf "/models/%s" $llmModelFileName | quote }}
            - name: LLAMA_ARG_HOST
              value: "0.0.0.0"
            - name: LLAMA_ARG_PORT
              value: {{ printf "%d" $llmServicePort | quote }}
            - name: LLAMA_ARG_CTX_SIZE
              value: {{ printf "%d" $llmContextSize | quote }}
            - name: LLAMA_ARG_THREADS
              value: {{ printf "%d" $llmThreads | quote }}
          ports:
            - name: http
              containerPort: {{ $llmServicePort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: atlasnet-llm-model-cache
{{- end }}
