name: Build and Deploy Doxygen

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  doxygen:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
      - name: Erase old docs
        run: rm -rf docs/html

      - name: Generate docs
        run: doxygen docs/Doxyfile

      #- name: Add .nojekyll
